name = "sunmoonlake-lowcarbon-api"
main = "worker.js"
compatibility_date = "2025-03-01"

# 允許前端網域（GitHub Pages）
[vars]
ALLOWED_ORIGIN = "https://onelifegpt-tech.github.io"

# KV Namespace：MEMBERS
[[kv_namespaces]]
binding = "MEMBERS"
id = "b592d43f850a41a48f3162b8a5e53ba7"

# 以下機密變數請 **勿寫在這裡**，用 `wrangler secret put XXX` 或 Dashboard 設定
# - LINE_CHANNEL_ACCESS_TOKEN
# - LINE_CHANNEL_SECRET
# - ADMIN_TOKEN
